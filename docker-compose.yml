services:
  neo4j:
    image: neo4j:5-community
    container_name: local-rag-neo4j
    restart: unless-stopped
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    environment:
      NEO4J_AUTH: "${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-password123}"
      NEO4J_server_memory_heap_initial__size: "${NEO4J_HEAP_INITIAL:-512m}"
      NEO4J_server_memory_heap_max__size: "${NEO4J_HEAP_MAX:-2G}"
      NEO4J_server_memory_pagecache_size: "${NEO4J_PAGECACHE:-1G}"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/var/lib/neo4j/import
      - neo4j_plugins:/plugins
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "cypher-shell -u ${NEO4J_USER:-neo4j} -p ${NEO4J_PASSWORD:-password123} 'RETURN 1'",
        ]
      interval: 10s
      timeout: 10s
      retries: 18
      start_period: 20s

  neo4j-init:
    image: neo4j:5-community
    container_name: local-rag-neo4j-init
    depends_on:
      neo4j:
        condition: service_healthy
    volumes:
      - ./docker/neo4j/init.cypher:/init.cypher:ro
    entrypoint: >
      bash -c "cypher-shell -a bolt://neo4j:7687
      -u ${NEO4J_USER:-neo4j}
      -p ${NEO4J_PASSWORD:-password123}
      -f /init.cypher"
    restart: "no"

volumes:
  neo4j_data:
  neo4j_logs:
  neo4j_import:
  neo4j_plugins:
